<div class="modal-backdrop">
  <div class="modal">
    <h3>🔐 Confirmation requise</h3>

    <input type="password"
           [(ngModel)]="password"
           placeholder="Mot de passe"
           class="input"/>

    <div class="actions">
      <button (click)="submit()">Confirmer</button>
      <button (click)="cancel.emit()">Annuler</button>
    </div>
  </div>
</div>
