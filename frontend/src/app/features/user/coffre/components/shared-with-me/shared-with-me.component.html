<div class="section">
  <h2>📥 Documents partagés avec moi</h2>

  <div *ngIf="loading" class="loader">Chargement...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <div class="documents-grid">
    <div class="document-card" *ngFor="let doc of documents">

      <div class="card-header">
        <span class="type">{{ doc.documentType }}</span>
        <span class="badge shared">
          👥 {{ doc.authorizedCount }} accès
        </span>
      </div>

      <div class="card-body">
        <p><strong>Titre :</strong> {{ doc.title }}</p>
        <p><strong>Origine :</strong> {{ doc.origine }}</p>
        <p><strong>Owner :</strong> {{ doc.ownerEmail }}</p>

        <div class="signature-info">

          <div *ngIf="doc.signedByCurrentUser" class="signed-me">
            ✔ Vous avez signé
          </div>

          <div class="sign-count">
            ✍️ {{ doc.totalSignatures }} signature(s)
          </div>

        </div>
      </div>

      <div class="card-actions">

        <button class="btn-primary" (click)="readDocument(doc)">
          Lire
        </button>

        <button
          class="btn-sign"
          [disabled]="doc.signedByCurrentUser"
          (click)="signDocument(doc)"
        >
          {{ doc.signedByCurrentUser ? 'Déjà signé' : 'Signer' }}
        </button>

        <button class="btn-secondary" (click)="openHistory(doc)">
          Historique
        </button>

      </div>

    </div>
  </div>
</div>
